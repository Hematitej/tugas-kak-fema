<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Form</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container">
    <div class="d-flex justify-content-between py-5">
        <div class="w-50">
            <h1>Profile Setting</h1> <br>
            <p>From this page, you can edit your profile details <br> and edit your password.</p>
        </div>
        <div>
            <button class="btn btn-light mt-5">Setting <i class="fa-solid fa-gear text-secondary"></i></button>
        </div>
    </div>

    <div class="bg-light mt-5 d-flex align-items-center">
        <img src="Limbad_Cahyadi.jpg" class="rounded-pill" alt="" style="width: 250px; height: 250px; margin-right: 30%">
        <div class="row">
            <div class="col">
                <p><b>Username</b></p>
                <input type="text" class="form-control mb-5" placeholder="Your Name" aria-label="First name">
                <p><b>WhatsApp</b></p>
                <input type="text" class="form-control" placeholder="+62xxxx" aria-label="WhatsApp Number">
            </div>
            <div class="col">
                <p><b>Instagram</b></p>
                <input type="text" class="form-control mb-5" placeholder="@xxxx" aria-label="Last name">
                <p><b>Email</b></p>
                <input type="text" class="form-control" placeholder="xxxx@gmail.com" aria-label="Last name">
            </div>
        </div>
    </div>

        <div class="d-flex justify-content-center mt-5">
            <button type="button" class="btn btn-success btn-lg rounded-pill"><b>Save</b></button>
        </div>
    </div>

    <br><br><br><br><br>



<footer class="bg-dark p-3 mt-auto">
        <div class="d-flex justify-content-between">
            <div>
                <h5 class="text-white">SCTIDAPSUS</h5>
            </div>
            <div class="d-flex text-white">
                <p><a href="" class="text-decoration-none text-white mx-2">Home</a></p>
                <p><a href="" class="text-decoration-none text-white mx-2">About</a></p>
                <p><a href="" class="text-decoration-none text-white mx-2">Account</a></p>
            </div>
        </div>
        <hr class="text-white">
        <div class="d-flex justify-content-between">
            <p class="text-white">&copy; Copyright 2025, Scindapsus Indonesia</p>
            <div>
                <i class="fa-brands fa-instagram text-white"></i>
                <i class="fa-brands fa-whatsapp text-white"></i>
            </div>
        </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</body>
</html>
